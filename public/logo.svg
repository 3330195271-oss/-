  <circle cx="44" cy="40" r="9" stroke="url(#lens)" stroke-width="1" opacity="0.35"/>
  <circle cx="44" cy="40" r="3.5" fill="url(#lens)" opacity="0.8"/>

  <!-- Text -->
  <text x="82" y="38" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="900" fill="#1d1d1f" letter-spacing="-1">多米摄影</text>
  <text x="82" y="54" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" font-weight="600" fill="#86868b" letter-spacing="2.5">DUOMI · DJI RENTAL</text>
