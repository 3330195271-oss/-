<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0071e3"/>
      <stop offset="1" stop-color="#005bb5"/>
    </linearGradient>
  </defs>

  <!-- Lens icon: concentric rings -->
  <circle cx="44" cy="40" r="24" stroke="url(#lens)" stroke-width="2.5"/>
